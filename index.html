<!DOCTYPE html>
<html>
<head>
    <title>Crop Yield Prediction</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #43cea2, #185a9d);
            margin: 0;
            padding: 0;
            text-align: center;
        }

        .container {
            width: 400px;
            margin: 60px auto;
            background: white;
            padding: 25px;
            border-radius: 15px;
        }

        input, select {
            width: 90%;
            padding: 10px;
            margin: 8px;
        }

        button {
            padding: 12px;
            width: 95%;
            background: green;
            color: white;
            border: none;
        }

        img {
            width: 100%;
            margin-top: 15px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>🌾 Crop Yield Prediction</h2>

    <form action="/predict" method="post">

        <input name="year" placeholder="Year" required>

        <select name="country">
            {% for c in countries %}
                <option value="{{c}}">{{c}}</option>
            {% endfor %}
        </select>

        <select name="crop">
            {% for crop in crops %}
                <option value="{{crop}}">{{crop}}</option>
            {% endfor %}
        </select>

        <input name="rainfall" placeholder="Rainfall" required>
        <input name="pesticides" placeholder="Pesticides" required>
        <input name="temperature" placeholder="Temperature" required>

        <button type="submit">Predict</button>
    </form>

    <h3>{{ prediction_text }}</h3>

    {% if plot_url %}
        <img src="data:image/png;base64,{{plot_url}}">
    {% endif %}

</div>

</body>
</html>
