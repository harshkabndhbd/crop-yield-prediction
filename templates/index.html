<!DOCTYPE html>
<html>
<head>
    <title>Crop Yield Prediction</title>

    <style>
        body {
            background: linear-gradient(135deg, #ff4b2b, #ff416c);
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 420px;
            text-align: center;
        }

        select, input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
        }

        button {
            background: #ff416c;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 8px;
        }

        img {
            margin-top: 15px;
            max-width: 100%;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>🌾 Crop Yield Predictor</h1>

    <form action="/predict" method="POST">

        <select name="country" required>
            {% for c in countries %}
            <option value="{{c}}" {% if c == selected_country %}selected{% endif %}>{{c}}</option>
            {% endfor %}
        </select>

        <select name="crop" required>
            {% for c in crops %}
            <option value="{{c}}" {% if c == selected_crop %}selected{% endif %}>{{c}}</option>
            {% endfor %}
        </select>

        <input type="number" name="rainfall" placeholder="Rainfall" required>
        <input type="number" name="pesticide" placeholder="Pesticide" required>
        <input type="number" name="temperature" placeholder="Temperature" required>

        <button type="submit">Predict</button>
    </form>

    {% if prediction %}
        <h3>Prediction: {{ prediction }}</h3>
    {% endif %}

    {% if graph_url %}
        <img src="data:image/png;base64,{{ graph_url }}">
    {% endif %}

</div>

</body>
</html>
