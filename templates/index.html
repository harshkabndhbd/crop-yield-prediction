<!DOCTYPE html>
<html>
<head>
    <title>Crop Yield Prediction</title>
</head>
<body style="background:#d4f4c4; font-family:Arial; padding:20px;">

    <h1>🌾 Crop Yield Prediction</h1>

    <form action="/predict" method="POST">

        <label>Country:</label><br>
        <select name="country" required>
            {% for c in countries %}
            <option value="{{c}}">{{c}}</option>
            {% endfor %}
        </select><br><br>

        <label>Crop:</label><br>
        <select name="crop" required>
            {% for c in crops %}
            <option value="{{c}}">{{c}}</option>
            {% endfor %}
        </select><br><br>

        <label>Rainfall:</label><br>
        <input type="number" name="rainfall" required><br><br>

        <label>Pesticide:</label><br>
        <input type="number" name="pesticide" required><br><br>

        <label>Temperature:</label><br>
        <input type="number" name="temperature" required><br><br>

        <button type="submit">Predict</button>
    </form>

    {% if prediction %}
        <h2>Prediction: {{ prediction }}</h2>
    {% endif %}

    {% if graph_url %}
        <h3>Graph:</h3>
        <img src="data:image/png;base64,{{ graph_url }}">
    {% endif %}

</body>
</html>
